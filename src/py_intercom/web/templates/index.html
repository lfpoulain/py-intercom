<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>py-intercom — Client Web</title>
    <link rel="stylesheet" href="/static/style.css" />
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js" crossorigin="anonymous"></script>
  </head>
  <body>
    <div class="wrap">
      <header class="header">
        <div class="title">py-intercom</div>
        <div class="subtitle">Client Web (Plateau)</div>
      </header>

      <section class="panel">
        <div class="row">
          <label>Serveur IP</label>
          <input id="serverIp" placeholder="192.168.1.10" />
        </div>
        <div class="row">
          <label>Port</label>
          <input id="serverPort" type="number" value="5000" />
        </div>
        <div class="row">
          <label>Nom</label>
          <input id="name" placeholder="Plateau" />
        </div>
        <div class="row">
          <label>Mode</label>
          <select id="mode">
            <option value="ptt" selected>PTT</option>
            <option value="always_on">Always-on</option>
          </select>
        </div>
        <div class="actions">
          <button id="btnConnect">Connecter</button>
          <button id="btnDisconnect" class="secondary" disabled>Déconnecter</button>
        </div>
      </section>

      <section class="panel">
        <div class="ptt">
          <button id="btnPtt" class="pttBtn" disabled>PTT (maintenir)</button>
          <div class="hint">Raccourci: maintenir <kbd>Espace</kbd></div>
        </div>
        <div class="status">
          <div id="statusLine" class="statusLine">Déconnecté</div>
          <div class="meters">
            <div class="meter">
              <div class="meterLabel">RX</div>
              <div class="meterBar"><div id="rxBar" class="meterFill"></div></div>
            </div>
          </div>
        </div>
      </section>

      <footer class="footer">
        <div id="log" class="log"></div>
      </footer>
    </div>

    <script src="/static/client.js"></script>
  </body>
</html>
